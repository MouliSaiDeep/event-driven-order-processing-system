version: '3.8'

services:
  zookeeper:
    image: 'confluentinc/cp-zookeeper:7.4.0'
    ports:
      - '${ZOOKEEPER_PORT}:2181'
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  kafka:
    image: 'confluentinc/cp-kafka:7.4.0'
    ports:
      - '${KAFKA_PORT}:9092'
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:${KAFKA_PORT},PLAINTEXT_INTERNAL://kafka:29092
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - order-network

  mysql-inventory:
    image: 'mysql:8.0'
    ports:
      - '${MYSQL_INVENTORY_PORT}:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_INVENTORY_DB}
      - MYSQL_ROOT_HOST=%
    volumes:
      - ./mysql/inventory:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  mysql-orderstatus:
    image: 'mysql:8.0'
    ports:
      - '${MYSQL_ORDERSTATUS_PORT}:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_ORDERSTATUS_DB}
      - MYSQL_ROOT_HOST=%
    volumes:
      - ./mysql/orderstatus:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  order-service:
    build: ./order-service
    ports:
      - "3005:3000"
    env_file:
      - ./order-service/.env
    environment:
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - order-network

  inventory-service:
    build: ./inventory-service
    env_file:
      - ./inventory-service/.env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - MYSQL_INVENTORY_HOST=mysql-inventory
      - MYSQL_INVENTORY_PORT=3306
    depends_on:
      kafka:
        condition: service_healthy
      mysql-inventory:
        condition: service_healthy
    networks:
      - order-network

  payment-service:
    build: ./payment-service
    env_file:
      - ./payment-service/.env
    environment:
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - order-network

  order-status-service:
    build: ./order-status-service
    ports:
      - "3006:3001"
    env_file:
      - ./order-status-service/.env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - MYSQL_ORDERSTATUS_HOST=mysql-orderstatus
      - MYSQL_ORDERSTATUS_PORT=3306
    depends_on:
      kafka:
        condition: service_healthy
      mysql-orderstatus:
        condition: service_healthy
    networks:
      - order-network

networks:
  order-network:
    driver: bridge
